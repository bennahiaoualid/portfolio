<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oualid Bennahia — Full Stack Developer</title>
  <meta name="description" content="Backend-focused Full Stack Developer specializing in PHP & Laravel." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            portfolio: {
              bg: '#050810',
              surface: '#0b1422',
              surf2: '#111e2e',
              border: '#1a2d45',
              accent: '#00c9a8',
              text: '#dde8f5',
              muted: '#4d6b8a',
              mono: '#7dd4c0',
            },
          },
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['Lato', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
            arabic: ['Cairo', 'sans-serif'],
          },
          maxWidth: {
            site: '72rem',
          },
          keyframes: {
            fadeUp: {
              from: { opacity: '0', transform: 'translateY(18px)' },
              to: { opacity: '1', transform: 'translateY(0)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.4' },
            },
          },
          animation: {
            'fade-up': 'fadeUp 0.55s ease both',
            'fade-up-1': 'fadeUp 0.55s 0.08s ease both',
            'fade-up-2': 'fadeUp 0.55s 0.18s ease both',
            'fade-up-3': 'fadeUp 0.55s 0.28s ease both',
            'fade-up-4': 'fadeUp 0.55s 0.4s ease both',
            'fade-up-5': 'fadeUp 0.55s 0.52s ease both',
            'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="assets/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body
  class="min-h-screen bg-portfolio-bg font-body text-base leading-relaxed text-portfolio-text antialiased"
  x-data="portfolio()"
  x-init="init()"
  x-cloak
>

  <div x-show="loading" class="fixed inset-0 z-[100] flex items-center justify-center bg-portfolio-bg font-mono text-sm text-portfolio-muted">
    <span>// loading portfolio…</span>
  </div>

  <div
    x-show="error && !loading"
    class="fixed inset-0 z-[100] flex flex-col items-center justify-center gap-4 bg-portfolio-bg p-8 text-center font-mono text-sm text-portfolio-muted max-w-xl mx-auto"
  >
    <p class="text-portfolio-text" x-text="error"></p>
    <p x-show="location.protocol === 'file:'" class="text-xs leading-relaxed">
      Images work from disk; JSON does not. Preview with
      <code class="text-portfolio-mono">serve.ps1</code> or deploy to GitHub Pages.
    </p>
  </div>

  <template x-if="!loading && data">
    <div>

      <nav class="fixed inset-x-0 top-0 z-50 border-b border-portfolio-border bg-portfolio-bg/80 backdrop-blur-xl">
        <div class="mx-auto flex max-w-site flex-wrap items-center justify-between gap-3 px-4 py-3.5 sm:px-6">
          <button type="button" class="cursor-pointer border-0 bg-transparent font-mono text-sm text-portfolio-accent" @click="go('home')">
            <span class="text-portfolio-muted">~/</span>oualid
          </button>
          <div class="flex flex-wrap items-center gap-4 sm:gap-5">
            <button
              type="button"
              class="cursor-pointer border-0 bg-transparent font-body text-sm transition-colors"
              :class="view === 'home' ? 'text-portfolio-accent' : 'text-portfolio-muted hover:text-portfolio-text'"
              @click="go('home')"
              x-text="data.nav.home"
            ></button>
            <button
              type="button"
              class="cursor-pointer border-0 bg-transparent font-body text-sm transition-colors"
              :class="view === 'projects' || view === 'project' ? 'text-portfolio-accent' : 'text-portfolio-muted hover:text-portfolio-text'"
              @click="go('projects')"
              x-text="data.nav.projects"
            ></button>
            <a
              class="font-body text-sm text-portfolio-muted no-underline transition-colors hover:text-portfolio-text"
              :href="'mailto:' + data.meta.email"
              x-text="data.nav.contact"
            ></a>
            <button
              type="button"
              class="cursor-pointer rounded border border-portfolio-border bg-transparent px-2.5 py-1 font-mono text-[0.72rem] text-portfolio-muted transition-colors hover:border-portfolio-accent/45 hover:text-portfolio-accent"
              @click="switchLang()"
              x-text="data.nav.lang_toggle"
            ></button>
          </div>
        </div>
      </nav>

      <!-- HOME -->
      <div x-show="view === 'home'" class="pt-16">

        <section class="grid-bg hero-atm py-12 sm:py-16 md:py-20 lg:py-24">
          <div class="mx-auto max-w-site px-4 sm:px-6">
            <div class="flex flex-col items-center gap-6 text-center md:flex-row md:items-center md:gap-10 md:text-start">
              <div class="h-24 w-24 shrink-0 overflow-hidden rounded-full border-2 border-portfolio-border bg-portfolio-surf2 animate-fade-up sm:h-28 sm:w-28">
                <img class="h-full w-full object-cover" src="assets/images/profile.jpg" alt="" @error="$el.style.display='none'" />
              </div>
              <div class="min-w-0 flex-1 md:max-w-none">
                <p class="mb-3 font-mono text-[0.68rem] uppercase tracking-widest text-portfolio-accent animate-fade-up-1" x-text="data.sections.hero_greeting"></p>
                <h1 class="mb-2 break-words font-display text-[clamp(1.65rem,9vw,3rem)] font-extrabold leading-tight text-portfolio-text animate-fade-up-1 md:text-[clamp(2.6rem,6vw,5rem)]" x-text="data.meta.name"></h1>
                <p class="mb-1 flex flex-col items-center gap-0.5 font-display text-[clamp(0.95rem,4vw,1.55rem)] font-bold text-portfolio-accent animate-fade-up-2 md:flex-row md:flex-wrap md:items-baseline md:gap-x-2">
                  <span x-text="data.meta.title"></span>
                  <span class="hidden font-normal text-portfolio-muted md:inline" aria-hidden="true"> | </span>
                  <span x-text="data.meta.subtitle"></span>
                </p>
                <p class="mb-8 max-w-xl text-portfolio-text/75 leading-relaxed animate-fade-up-3 md:mb-10" x-text="data.meta.bio"></p>
                <div class="mb-6 flex w-full flex-col gap-3 animate-fade-up-4 sm:flex-row sm:flex-wrap sm:justify-center md:justify-start">
                  <button type="button" class="inline-block w-full cursor-pointer rounded border-0 bg-portfolio-accent px-6 py-2.5 text-center font-display text-sm font-bold text-portfolio-bg transition-opacity hover:opacity-85 sm:w-auto" @click="go('projects')" x-text="data.nav.view_projects"></button>
                  <a class="inline-block w-full rounded border border-portfolio-border bg-transparent px-6 py-2.5 text-center font-display text-sm font-bold text-portfolio-muted no-underline transition-colors hover:border-portfolio-accent/45 hover:text-portfolio-accent sm:w-auto" :href="data.meta.github" target="_blank" rel="noopener" x-text="data.nav.github"></a>
                  <a class="inline-block w-full rounded border border-portfolio-border bg-transparent px-6 py-2.5 text-center font-display text-sm font-bold text-portfolio-muted no-underline transition-colors hover:border-portfolio-accent/45 hover:text-portfolio-accent sm:w-auto" :href="'mailto:' + data.meta.email" x-text="data.nav.contact_me"></a>
                </div>
                <div class="flex flex-col items-center gap-2 text-sm text-portfolio-muted animate-fade-up-5 md:flex-row md:gap-4">
                  <span class="inline-flex items-center gap-2">
                    <span class="h-2 w-2 shrink-0 rounded-full bg-portfolio-accent animate-pulse-soft" aria-hidden="true"></span>
                    <span x-text="data.nav.available"></span>
                  </span>
                  <span class="hidden text-portfolio-border md:inline" aria-hidden="true">|</span>
                  <span class="font-mono text-sm" x-text="data.meta.location"></span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="border-t border-portfolio-border py-14 sm:py-16 md:py-20">
          <div class="mx-auto max-w-site px-4 sm:px-6">
            <p class="mb-2 font-mono text-[0.68rem] uppercase tracking-widest text-portfolio-accent" x-text="data.sections.skills_label"></p>
            <h2 class="mb-10 font-display text-3xl font-extrabold text-portfolio-text" x-text="data.sections.skills_title"></h2>
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-[repeat(auto-fill,minmax(250px,1fr))]">
              <template x-for="sk in data.skills" :key="sk.category">
                <div class="rounded-lg border border-portfolio-border bg-portfolio-surface p-5 transition-colors hover:border-portfolio-accent/30">
                  <p class="mb-3 font-display text-sm font-bold text-portfolio-text" x-text="sk.category"></p>
                  <div class="flex flex-wrap gap-1.5">
                    <template x-for="item in sk.items" :key="item">
                      <span class="whitespace-nowrap rounded border border-portfolio-accent/20 bg-portfolio-accent/10 px-2.5 py-0.5 font-mono text-[0.67rem] text-portfolio-accent" x-text="item"></span>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </section>

        <section class="border-t border-portfolio-border py-14 sm:py-16 md:py-20">
          <div class="mx-auto max-w-site px-4 sm:px-6">
            <p class="mb-2 font-mono text-[0.68rem] uppercase tracking-widest text-portfolio-accent" x-text="data.sections.projects_label"></p>
            <h2 class="mb-10 font-display text-3xl font-extrabold text-portfolio-text" x-text="data.sections.projects_title"></h2>
            <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-[repeat(auto-fill,minmax(280px,1fr))]">
              <template x-for="p in data.projects" :key="p.id">
                <article class="group cursor-pointer overflow-hidden rounded-lg border border-portfolio-border bg-portfolio-surface transition hover:-translate-y-0.5 hover:border-portfolio-accent/40" @click="openProject(p.id)">
                  <div class="relative aspect-video overflow-hidden border-b border-portfolio-border bg-portfolio-surf2">
                    <img class="absolute inset-0 z-[1] h-full w-full object-cover" :src="p.thumbnail" :alt="p.title" @error="$event.target.style.opacity='0'" />
                    <div class="absolute inset-0 z-0 flex items-center justify-center">
                      <span class="font-mono text-3xl text-portfolio-border">&lt;/&gt;</span>
                    </div>
                  </div>
                  <div class="p-5 text-center sm:text-start">
                    <h3 class="mb-2 font-display text-base font-bold leading-snug text-portfolio-text" x-text="p.title"></h3>
                    <p class="mb-4 text-[0.82rem] leading-relaxed text-portfolio-muted" x-text="p.short_description"></p>
                    <div class="mb-4 flex flex-wrap justify-center sm:justify-start gap-1.5">
                      <template x-for="tag in p.tags.slice(0, 3)" :key="tag">
                        <span class="whitespace-nowrap rounded border border-portfolio-accent/20 bg-portfolio-accent/10 px-2.5 py-0.5 font-mono text-[0.67rem] text-portfolio-accent" x-text="tag"></span>
                      </template>
                    </div>
                    <span class="font-mono text-xs text-portfolio-accent" x-text="data.nav.view_case_study"></span>
                  </div>
                </article>
              </template>
            </div>
            <div class="mt-10 text-center">
              <button type="button" class="inline-block cursor-pointer rounded border border-portfolio-border bg-transparent px-6 py-2.5 font-display text-sm font-bold text-portfolio-muted transition-colors hover:border-portfolio-accent/45 hover:text-portfolio-accent" @click="go('projects')" x-text="data.nav.view_all_projects"></button>
            </div>
          </div>
        </section>

        <section class="border-t border-portfolio-border py-14 sm:py-16 md:py-20">
          <div class="mx-auto max-w-site px-4 sm:px-6">
            <p class="mb-2 font-mono text-[0.68rem] uppercase tracking-widest text-portfolio-accent" x-text="data.sections.about_label"></p>
            <h2 class="mb-10 font-display text-3xl font-extrabold text-portfolio-text" x-text="data.sections.about_title"></h2>
            <div class="grid grid-cols-1 gap-10 lg:grid-cols-2 lg:gap-12">
              <div>
                <p class="mb-4 leading-relaxed text-portfolio-text/80" x-text="data.meta.bio"></p>
                <p class="text-sm leading-relaxed text-portfolio-muted" x-text="data.meta.extended_bio"></p>
              </div>
              <div>
                <h3 class="mb-4 font-display text-sm font-bold text-portfolio-text" x-text="data.sections.education_title"></h3>
                <template x-for="edu in data.education" :key="edu.institution">
                  <div class="mb-3 rounded-lg border border-portfolio-border bg-portfolio-surface p-4">
                    <p class="font-display text-sm font-bold text-portfolio-text" x-text="edu.institution"></p>
                    <p class="mt-1 text-[0.83rem] text-portfolio-accent" x-text="edu.degree"></p>
                    <p class="mt-1 font-mono text-[0.72rem] text-portfolio-muted" x-text="edu.years"></p>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </section>

        <section class="border-t border-portfolio-border py-14 sm:py-16 md:py-20">
          <div class="mx-auto max-w-site px-4 sm:px-6">
            <p class="mb-2 font-mono text-[0.68rem] uppercase tracking-widest text-portfolio-accent" x-text="data.sections.contact_label"></p>
            <h2 class="mb-3 font-display text-3xl font-extrabold text-portfolio-text" x-text="data.sections.contact_title"></h2>
            <p class="mb-8 max-w-xl text-portfolio-muted" x-text="data.sections.contact_subtext"></p>
            <div class="flex flex-wrap gap-3">
              <a class="inline-flex items-center gap-2.5 rounded-md border border-portfolio-border bg-portfolio-surface px-4 py-2.5 no-underline transition-colors hover:border-portfolio-accent/45" :href="'mailto:' + data.meta.email">
                <span class="font-mono text-xs text-portfolio-accent">@</span>
                <span class="font-mono text-xs text-portfolio-muted" x-text="data.meta.email"></span>
              </a>
              <a class="inline-flex items-center gap-2.5 rounded-md border border-portfolio-border bg-portfolio-surface px-4 py-2.5 no-underline transition-colors hover:border-portfolio-accent/45" :href="data.meta.github" target="_blank" rel="noopener">
                <span class="font-mono text-xs text-portfolio-accent">gh</span>
                <span class="font-mono text-xs text-portfolio-muted" x-text="data.contact.github_label"></span>
              </a>
              <a class="inline-flex items-center gap-2.5 rounded-md border border-portfolio-border bg-portfolio-surface px-4 py-2.5 no-underline transition-colors hover:border-portfolio-accent/45" x-show="data.meta.linkedin" :href="data.meta.linkedin" target="_blank" rel="noopener">
                <span class="font-mono text-xs text-portfolio-accent">in</span>
                <span class="font-mono text-xs text-portfolio-muted" x-text="data.contact.linkedin_label"></span>
              </a>
              <a class="inline-flex items-center gap-2.5 rounded-md border border-portfolio-border bg-portfolio-surface px-4 py-2.5 no-underline transition-colors hover:border-portfolio-accent/45" x-show="data.meta.phone" :href="'tel:' + data.meta.phone.replace(/\s/g,'')">
                <span class="font-mono text-xs text-portfolio-accent">#</span>
                <span class="font-mono text-xs text-portfolio-muted" x-text="data.meta.phone"></span>
              </a>
            </div>
          </div>
        </section>

        <footer class="border-t border-portfolio-border">
          <div class="mx-auto flex max-w-site flex-wrap justify-between gap-2 px-4 py-6 sm:px-6">
            <span class="font-mono text-[0.72rem] text-portfolio-muted" x-text="data.footer.copyright"></span>
            <span class="font-mono text-[0.72rem] text-portfolio-muted" x-text="data.footer.built_with"></span>
          </div>
        </footer>
      </div>

      <!-- PROJECTS LIST -->
      <div x-show="view === 'projects'" class="min-h-screen pt-16">
        <div class="mx-auto max-w-site px-4 py-12 sm:px-6 sm:py-14">
          <button type="button" class="mb-8 block cursor-pointer border-0 bg-transparent font-mono text-[0.72rem] text-portfolio-muted transition-colors hover:text-portfolio-accent" @click="go('home')" x-text="data.nav.back_home"></button>
          <p class="mb-2 font-mono text-[0.68rem] uppercase tracking-widest text-portfolio-accent" x-text="data.sections.all_work_label"></p>
          <h2 class="mb-12 font-display text-4xl font-extrabold text-portfolio-text" x-text="data.sections.all_work_title"></h2>
          <div class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-[repeat(auto-fill,minmax(320px,1fr))]">
            <template x-for="p in data.projects" :key="p.id">
              <article class="group cursor-pointer overflow-hidden rounded-lg border border-portfolio-border bg-portfolio-surface transition hover:-translate-y-0.5 hover:border-portfolio-accent/40" @click="openProject(p.id)">
                <div class="relative aspect-video overflow-hidden border-b border-portfolio-border bg-portfolio-surf2">
                  <img class="absolute inset-0 z-[1] h-full w-full object-cover" :src="p.thumbnail" :alt="p.title" @error="$event.target.style.opacity='0'" />
                  <div class="absolute inset-0 z-0 flex items-center justify-center">
                    <span class="font-mono text-4xl text-portfolio-border">&lt;/&gt;</span>
                  </div>
                </div>
                <div class="p-6">
                  <h3 class="mb-2 font-display text-lg font-bold text-portfolio-text" x-text="p.title"></h3>
                  <p class="mb-4 text-[0.83rem] leading-relaxed text-portfolio-muted" x-text="p.short_description"></p>
                  <div class="mb-5 flex flex-wrap gap-1.5">
                    <template x-for="tag in p.tags" :key="tag">
                      <span class="whitespace-nowrap rounded border border-portfolio-accent/20 bg-portfolio-accent/10 px-2.5 py-0.5 font-mono text-[0.67rem] text-portfolio-accent" x-text="tag"></span>
                    </template>
                  </div>
                  <div class="flex items-center justify-between">
                    <span class="font-mono text-xs text-portfolio-accent" x-text="data.nav.view_case_study"></span>
                    <a x-show="p.links?.github" :href="p.links.github" target="_blank" rel="noopener" @click.stop class="font-mono text-[0.72rem] text-portfolio-muted no-underline hover:text-portfolio-text">GitHub ↗</a>
                  </div>
                </div>
              </article>
            </template>
          </div>
        </div>
      </div>

      <!-- PROJECT DETAIL -->
      <div x-show="view === 'project'" class="min-h-screen pt-16">
        <template x-if="currentProject">
          <div>
            <div class="border-b border-portfolio-border bg-portfolio-surf2 py-10 sm:py-12">
              <div class="mx-auto max-w-site px-4 sm:px-6">
                <button type="button" class="mb-8 block cursor-pointer border-0 bg-transparent font-mono text-[0.72rem] text-portfolio-muted transition-colors hover:text-portfolio-accent" @click="go('projects')" x-text="data.nav.back_projects"></button>
                <div class="mb-4 flex flex-wrap gap-1.5">
                  <template x-for="tag in currentProject.tags" :key="tag">
                    <span class="whitespace-nowrap rounded border border-portfolio-accent/20 bg-portfolio-accent/10 px-2.5 py-0.5 font-mono text-[0.67rem] text-portfolio-accent" x-text="tag"></span>
                  </template>
                </div>
                <h1 class="mb-3 font-display text-center sm:text-start text-[clamp(1.8rem,4vw,3rem)] font-extrabold leading-tight text-portfolio-text" x-text="currentProject.title"></h1>
                <p class="max-w-2xl text-center sm:text-start leading-relaxed text-portfolio-muted" x-text="currentProject.short_description"></p>
                <div class="mt-6 flex flex-wrap gap-6">
                  <a x-show="currentProject.links?.github" :href="currentProject.links.github" target="_blank" rel="noopener" class="font-mono text-xs text-portfolio-accent no-underline hover:opacity-70" x-text="data.sections.view_github"></a>
                  <a x-show="currentProject.links?.demo" :href="currentProject.links.demo" target="_blank" rel="noopener" class="font-mono text-xs text-portfolio-accent no-underline hover:opacity-70" x-text="data.sections.live_demo"></a>
                </div>
              </div>
            </div>

            <div class="mx-auto max-w-site px-4 py-12 sm:px-6 sm:py-14">
              <div class="grid grid-cols-1 items-start gap-10 lg:grid-cols-[minmax(0,2fr)_minmax(0,1fr)] lg:gap-12">
                <div class="flex flex-col gap-10 lg:gap-12">
                  <section>
                    <p class="mb-3 font-mono text-[0.68rem] uppercase tracking-widest text-portfolio-accent" x-text="data.sections.problem"></p>
                    <p class="leading-relaxed text-portfolio-text/80" x-text="currentProject.case_study.problem"></p>
                  </section>
                  <section class="border-t border-portfolio-border pt-10 lg:pt-12">
                    <p class="mb-3 font-mono text-[0.68rem] uppercase tracking-widest text-portfolio-accent" x-text="data.sections.role"></p>
                    <p class="leading-relaxed text-portfolio-text/80" x-text="currentProject.case_study.my_role"></p>
                  </section>
                  <section class="border-t border-portfolio-border pt-10 lg:pt-12">
                    <p class="mb-3 font-mono text-[0.68rem] uppercase tracking-widest text-portfolio-accent" x-text="data.sections.architecture"></p>
                    <div class="mermaid-wrap overflow-x-auto rounded-lg border border-portfolio-border bg-portfolio-surf2 p-6">
                      <div id="arch-diagram"></div>
                    </div>
                  </section>
                  <section class="border-t border-portfolio-border pt-10 lg:pt-12">
                    <p class="mb-5 font-mono text-[0.68rem] uppercase tracking-widest text-portfolio-accent" x-text="data.sections.challenges"></p>
                    <div class="flex flex-col gap-5">
                      <template x-for="ch in currentProject.case_study.challenges" :key="ch.title">
                        <div class="border-s-2 border-portfolio-accent/40 ps-4 rtl:border-s-0 rtl:border-e-2 rtl:ps-0 rtl:pe-4">
                          <p class="mb-1.5 font-display text-sm font-bold text-portfolio-text" x-text="ch.title"></p>
                          <p class="text-sm leading-relaxed text-portfolio-muted" x-text="ch.description"></p>
                        </div>
                      </template>
                    </div>
                  </section>
                  <section class="border-t border-portfolio-border pt-10 lg:pt-12">
                    <p class="mb-5 font-mono text-[0.68rem] uppercase tracking-widest text-portfolio-accent" x-text="data.sections.screenshots"></p>
